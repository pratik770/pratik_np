<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royal Blackjack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="21cc.css" />
</head>
<body>

<!-- LOBBY SCREEN -->

<div id="lobby" class="screen active">
  <div class="felt-bg"></div>
  <div class="lobby-container">
    <div class="logo">
      <div class="suit-row">♠ ♥ ♦ ♣</div>
      <h1>Royal Blackjack</h1>
      <p class="tagline">Classic Casino. Real Action.</p>
    </div>
    <div class="lobby-cards">
      <div class="lobby-card" id="btn-solo">
        <div class="card-icon">🃏</div>
        <h2>Solo Play</h2>
        <p>Play against the dealer alone</p>
      </div>
      <div class="lobby-card" id="btn-host">
        <div class="card-icon">👑</div>
        <h2>Host Table</h2>
        <p>Create a multiplayer room</p>
      </div>
      <div class="lobby-card" id="btn-join">
        <div class="card-icon">🎴</div>
        <h2>Join Table</h2>
        <p>Enter a room code to join</p>
      </div>
    </div>
    <div id="join-form" class="hidden">
      <input type="text" id="room-code-input" placeholder="Enter room code..." maxlength="6" />
      <input type="text" id="player-name-input" placeholder="Your name..." maxlength="16" />
      <button id="btn-join-confirm" class="chip-btn gold">Join Game</button>
      <button id="btn-join-cancel" class="chip-btn grey">Cancel</button>
    </div>
    <div id="host-form" class="hidden">
      <input type="text" id="host-name-input" placeholder="Your name..." maxlength="16" />
      <button id="btn-host-confirm" class="chip-btn gold">Create Room</button>
      <button id="btn-host-cancel" class="chip-btn grey">Cancel</button>
    </div>
  </div>
</div>

<!-- WAITING ROOM -->

<div id="waiting-room" class="screen">
  <div class="felt-bg"></div>
  <div class="waiting-container">
    <h2>Waiting Room</h2>
    <div class="room-code-display">
      Room Code: <span id="display-room-code">------</span>
      <button id="btn-copy-code" class="chip-btn small">Copy</button>
    </div>
    <div id="player-list"></div>
    <button id="btn-start-mp" class="chip-btn gold large">Start Game</button>
    <button id="btn-leave-room" class="chip-btn grey">Leave Room</button>
    <p id="waiting-msg" class="hint-text">Waiting for players to join...</p>
  </div>
</div>

<!-- GAME SCREEN -->

<div id="game-screen" class="screen">
  <div class="felt-bg"></div>

  <!-- Top bar -->

  <div class="top-bar">
    <div class="player-info-bar" id="top-player-chips">
      <span class="chip-icon">🪙</span>
      <span id="player-chips-display">1000</span>
    </div>
    <div class="game-title-small">Royal Blackjack</div>
    <div class="top-right-btns">
      <button id="btn-hint" class="chip-btn small">💡 Hint</button>
      <button id="btn-menu" class="chip-btn small">☰</button>
    </div>
  </div>

  <!-- Multiplayer Seats (hidden in solo) -->

  <div id="mp-seats" class="mp-seats hidden"></div>

  <!-- Dealer Area -->

  <div class="dealer-area">
    <div class="area-label">Dealer</div>
    <div id="dealer-hand" class="hand"></div>
    <div id="dealer-score" class="score-badge">0</div>
  </div>

  <!-- Hint Box -->

  <div id="hint-box" class="hint-box hidden"></div>

  <!-- Player Area -->

  <div class="player-area">
    <div class="area-label" id="your-label">You</div>
    <div id="player-hands-wrapper">
      <!-- Hands rendered by JS (supports split) -->
    </div>
  </div>

  <!-- Betting Bar -->

  <div id="bet-bar" class="bet-bar">
    <div class="chips-row">
      <button class="chip c5"   data-val="5">$5</button>
      <button class="chip c25"  data-val="25">$25</button>
      <button class="chip c50"  data-val="50">$50</button>
      <button class="chip c100" data-val="100">$100</button>
      <button class="chip c500" data-val="500">$500</button>
    </div>
    <div class="bet-info">
      <span>Bet: $<span id="current-bet-display">0</span></span>
      <button id="btn-clear-bet" class="chip-btn small grey">Clear</button>
      <button id="btn-deal"      class="chip-btn gold large">Deal</button>
    </div>
  </div>

  <!-- Action Bar -->

  <div id="action-bar" class="action-bar hidden">
    <button id="btn-hit"       class="action-btn green">Hit</button>
    <button id="btn-stand"     class="action-btn red">Stand</button>
    <button id="btn-double"    class="action-btn blue">Double</button>
    <button id="btn-split"     class="action-btn purple">Split</button>
  </div>

  <!-- Result overlay -->

  <div id="result-overlay" class="result-overlay hidden">
    <div class="result-box">
      <div id="result-title" class="result-title"></div>
      <div id="result-detail" class="result-detail"></div>
      <button id="btn-next-round" class="chip-btn gold large">Next Round</button>
    </div>
  </div>

  <!-- Menu overlay -->

  <div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu-box">
      <h3>Menu</h3>
      <button id="btn-resume" class="chip-btn gold">Resume</button>
      <button id="btn-back-lobby" class="chip-btn grey">Back to Lobby</button>
    </div>
  </div>
</div>

<script src="21cc.js"></script>

</body>
</html>
